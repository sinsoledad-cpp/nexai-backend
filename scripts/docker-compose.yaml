name: nexai

networks:
  net01:
    driver: bridge

services:

#----------------------------------------------------------------------------------------------
  #mysql环境# https://github.com/bitnami/containers/tree/main/bitnami/mysql#how-to-use-this-image
  # todo sudo rm -rf mysql ; sudo mkdir -p mysql/data mysql/conf  && sudo chown -R 1001:1001 mysql &&  sudo docker pull registry.cn-guangzhou.aliyuncs.com/dbinggo-bitnami/mysql:8.0 && sudo docker tag registry.cn-guangzhou.aliyuncs.com/dbinggo-bitnami/mysql:8.0 bitnami/mysql:8.0
  mysql:
    image: bitnami/mysql:8.0  # sudo docker pull registry.cn-guangzhou.aliyuncs.com/dbinggo-bitnami/mysql:8.0 && sudo docker tag registry.cn-guangzhou.aliyuncs.com/dbinggo-bitnami/mysql:8.0 bitnami/mysql:8.0
    container_name: nexai-mysql # 强制指定容器的名称为 mysql
    hostname: mysql # 设置容器内部的主机名为 mysql
    restart: unless-stopped
#    privileged: true # 特权模式
    ports:
      - "13306:3306"
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nexai # 自动创建数据库 nexai
#    volumes:
#      - "./mysql/data:/bitnami/mysql/data" # sudo rm -rf mysql ; sudo mkdir mysql && sudo chown -R 1001:1001 mysql
#      - "./mysql/conf:/opt/bitnami/mysql/conf"
    networks:
      - net01
    healthcheck:
      test: [ 'CMD', '/opt/bitnami/scripts/mysql/healthcheck.sh' ]
      interval: 10s
      timeout: 5s
      retries: 6
#----------------------------------------------------------------------------------------------
  #postgresql环境# https://github.com/bitnami/containers/tree/main/bitnami/postgresql#how-to-use-this-image
  # todo sudo rm -rf postgresql ; sudo mkdir -p postgresql/data postgresql/conf  && sudo chown -R 1001:1001 postgresql &&  sudo docker pull registry.cn-guangzhou.aliyuncs.com/dbinggo-bitnami/postgresql:15.0 && sudo docker tag registry.cn-guangzhou.aliyuncs.com/dbinggo-bitnami/postgresql:15.0 bitnami/postgresql:15.0
  postgresql:
    image: bitnami/postgresql:latest  # sudo docker pull registry.cn-guangzhou.aliyuncs.com/dbinggo-bitnami/postgresql:15.0 && sudo docker tag registry.cn-guangzhou.aliyuncs.com/dbinggo-bitnami/postgresql:15.0 bitnami/postgresql:15.0
    container_name: nexai-postgresql # 强制指定容器的名称为 postgresql
    hostname: postgresql # 设置容器内部的主机名为 postgresql
    restart: unless-stopped
#    privileged: true # 特权模式
    ports:
      - "15432:5432"
    environment:
      # 基础配置
      - POSTGRESQL_USERNAME=postgres
      - POSTGRESQL_PASSWORD=postgres123
      - POSTGRESQL_DATABASE=mydb

      # 可选：允许远程连接
      - POSTGRESQL_POSTGRES_PASSWORD=postgres123

      # 性能 & 编码
      - POSTGRESQL_SHARED_PRELOAD_LIBRARIES=pg_stat_statements
      - POSTGRESQL_CLIENT_ENCODING=UTF8

    # volumes:
    #   # 数据持久化
    #   - ./postgresql/data:/bitnami/postgresql

    #   # 自定义配置（可选）
    #   - ./postgresql/conf/postgresql.conf:/opt/bitnami/postgresql/conf/postgresql.conf
    networks:
      - net01
#----------------------------------------------------------------------------------------------
  redis:
    image: "bitnami/redis:latest"
    container_name: nexai-redis # 强制指定容器的名称为 mysql
    hostname: redis # 设置容器内部的主机名为 mysql
    restart: unless-stopped
    ports:
      - '16379:6379'
    environment:
      - ALLOW_EMPTY_PASSWORD=yes
    networks:
      - net01
